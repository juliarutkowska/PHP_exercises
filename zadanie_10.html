<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rozbudowany Menedżer Zadań</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f5f6f8;
            font-family: Arial, Helvetica, sans-serif;
            color: #2f3f55;
        }

        .container {
            width: min(1320px, calc(100% - 32px));
            margin: 0 auto;
            padding-bottom: 40px;
        }

        header {
            text-align: center;
            padding-top: 6px;
        }

        header h1 {
            margin: 0;
            font-size: 58px;
            font-weight: 800;
            color: #314156;
            letter-spacing: 0.5px;
        }

        .top-line {
            margin-top: 32px;
            height: 3px;
            background: #4e9af1;
            width: 100%;
        }

        main {
            margin-top: 40px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            padding: 42px 34px 36px;
        }

        h2 {
            margin: 0 0 28px 0;
            font-size: 34px;
            font-weight: 800;
            color: #314156;
        }

        .alert {
            display: none;
            align-items: flex-start;
            gap: 12px;
            background: #f4d7d9;
            border-left: 6px solid #d74d57;
            color: #7b2d32;
            padding: 20px 22px;
            border-radius: 6px;
            margin-bottom: 28px;
            font-size: 21px;
        }

        .alert.show {
            display: flex;
        }

        .alert ul {
            margin: 0;
            padding-left: 22px;
        }

        .alert li + li {
            margin-top: 6px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 34px 26px;
        }

        .full {
            grid-column: 1 / -1;
        }

        .triple {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 26px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 22px;
            font-weight: 800;
            color: #314156;
            margin-bottom: 12px;
        }

        .required {
            color: #ef4444;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            border: 2px solid #d8d8d8;
            border-radius: 7px;
            background: #fff;
            color: #333;
            font-size: 20px;
            padding: 12px 14px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        select {
            height: 56px;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #4e9af1;
            box-shadow: 0 0 0 4px rgba(78, 154, 241, 0.15);
        }

        .error-field {
            border-color: #d74d57 !important;
            box-shadow: 0 0 0 4px rgba(215, 77, 87, 0.12) !important;
        }

        .resources {
            grid-column: 1 / -1;
            margin-top: 8px;
        }

        .resources-title {
            font-size: 22px;
            font-weight: 800;
            color: #314156;
            margin-bottom: 18px;
        }

        .resources-list {
            display: flex;
            flex-wrap: wrap;
            gap: 22px 26px;
        }

        .check-item {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            color: #314156;
        }

        .check-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #4e9af1;
            cursor: pointer;
        }

        .notify-row {
            grid-column: 1 / -1;
            margin-top: 6px;
        }

        .notify-box {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 21px;
            font-weight: 700;
            color: #314156;
        }

        .notify-box input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #4e9af1;
        }

        .buttons {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            margin-top: 10px;
        }

        button {
            border: none;
            border-radius: 8px;
            font-size: 19px;
            font-weight: 700;
            padding: 14px 22px;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
            opacity: 0.96;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
        }

        .btn-reset {
            background: #e4e7eb;
            color: #314156;
        }

        .btn-submit {
            background: #4e9af1;
            color: white;
        }

        footer {
            text-align: center;
            color: #6d7681;
            font-size: 16px;
            margin-top: 18px;
        }

        @media (max-width: 900px) {
            header h1 {
                font-size: 42px;
            }

            .triple {
                grid-template-columns: 1fr;
            }

            .resources-list {
                gap: 16px 18px;
            }
        }

        @media (max-width: 600px) {
            .container {
                width: calc(100% - 20px);
            }

            main {
                padding: 24px 16px;
            }

            header h1 {
                font-size: 32px;
            }

            h2 {
                font-size: 28px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 22px;
            }

            .full,
            .resources,
            .notify-row,
            .buttons,
            .triple {
                grid-column: auto;
            }

            .triple {
                display: grid;
                grid-template-columns: 1fr;
                gap: 22px;
            }

            label,
            .resources-title,
            .check-item {
                font-size: 18px;
            }

            input[type="text"],
            input[type="date"],
            input[type="number"],
            select,
            textarea {
                font-size: 17px;
            }

            .alert {
                font-size: 18px;
                padding: 16px;
            }

            .buttons {
                justify-content: stretch;
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Rozbudowany Menedżer Zadań</h1>
        <div class="top-line"></div>
    </header>

    <main>
        <h2>Dodaj nowe zadanie</h2>

        <div class="alert" id="alertBox">
            <div>•</div>
            <div id="alertContent"></div>
        </div>

        <form id="taskForm" class="form-grid">
            <div class="form-group">
                <label for="tytul">Tytuł zadania: <span class="required">*</span></label>
                <input type="text" id="tytul" name="tytul">
            </div>

            <div class="form-group">
                <label for="kategoria">Kategoria: <span class="required">*</span></label>
                <select id="kategoria" name="kategoria">
                    <option value="">Wybierz kategorię</option>
                    <option>Domowe</option>
                    <option>Praca</option>
                    <option>Nauka</option>
                    <option>Hobby</option>
                    <option>Inne</option>
                </select>
            </div>

            <div class="form-group full">
                <label for="opis">Opis zadania:</label>
                <textarea id="opis" name="opis"></textarea>
            </div>

            <div class="triple">
                <div class="form-group">
                    <label for="priorytet">Priorytet: <span class="required">*</span></label>
                    <select id="priorytet" name="priorytet">
                        <option value="">Wybierz priorytet</option>
                        <option>Niski</option>
                        <option>Średni</option>
                        <option>Wysoki</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="status">Status:</label>
                    <select id="status" name="status">
                        <option value="">Wybierz status</option>
                        <option>Nowe</option>
                        <option>W toku</option>
                        <option>Zakończone</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="data_wykonania">Data wykonania: <span class="required">*</span></label>
                    <input type="date" id="data_wykonania" name="data_wykonania">
                </div>
            </div>

            <div class="triple">
                <div class="form-group">
                    <label for="czas">Szacowany czas (minuty):</label>
                    <input type="number" id="czas" name="czas" min="0">
                </div>

                <div class="form-group">
                    <label for="lokalizacja">Lokalizacja:</label>
                    <input type="text" id="lokalizacja" name="lokalizacja">
                </div>

                <div class="form-group">
                    <label for="osoba">Osoba przypisana:</label>
                    <input type="text" id="osoba" name="osoba">
                </div>
            </div>

            <div class="resources">
                <div class="resources-title">Potrzebne zasoby:</div>
                <div class="resources-list">
                    <label class="check-item"><input type="checkbox" name="zasoby[]" value="Komputer"> Komputer</label>
                    <label class="check-item"><input type="checkbox" name="zasoby[]" value="Internet"> Internet</label>
                    <label class="check-item"><input type="checkbox" name="zasoby[]" value="Telefon"> Telefon</label>
                    <label class="check-item"><input type="checkbox" name="zasoby[]" value="Samochód"> Samochód</label>
                    <label class="check-item"><input type="checkbox" name="zasoby[]" value="Książka"> Książka</label>
                    <label class="check-item"><input type="checkbox" name="zasoby[]" value="Narzędzia"> Narzędzia</label>
                    <label class="check-item"><input type="checkbox" name="zasoby[]" value="Dokumenty"> Dokumenty</label>
                    <label class="check-item"><input type="checkbox" name="zasoby[]" value="Inne"> Inne</label>
                </div>
            </div>

            <div class="notify-row">
                <label class="notify-box">
                    <input type="checkbox" id="powiadomienia" name="powiadomienia">
                    Powiadomienia
                </label>
            </div>

            <div class="buttons">
                <button type="reset" class="btn-reset">Wyczyść</button>
                <button type="submit" class="btn-submit">Zapisz zadanie</button>
            </div>
        </form>
    </main>

    <footer>
        Formularz demonstracyjny — HTML/CSS Grid
    </footer>
</div>

<script>
    const form = document.getElementById("taskForm");
    const alertBox = document.getElementById("alertBox");
    const alertContent = document.getElementById("alertContent");

    const requiredFields = [
        { id: "tytul", message: "Tytuł zadania jest wymagany" },
        { id: "kategoria", message: "Kategoria jest wymagana" },
        { id: "priorytet", message: "Priorytet jest wymagany" },
        { id: "data_wykonania", message: "Data wykonania jest wymagana" }
    ];

    function clearErrors() {
        document.querySelectorAll(".error-field").forEach(el => {
            el.classList.remove("error-field");
        });
        alertBox.classList.remove("show");
        alertContent.innerHTML = "";
    }

    form.addEventListener("submit", function (e) {
        clearErrors();

        let errors = [];

        requiredFields.forEach(field => {
            const element = document.getElementById(field.id);
            if (!element.value.trim()) {
                errors.push(field.message);
                element.classList.add("error-field");
            }
        });

        if (errors.length > 0) {
            e.preventDefault();
            alertBox.classList.add("show");

            let html = "<ul>";
            errors.forEach(error => {
                html += "<li>" + error + "</li>";
            });
            html += "</ul>";

            alertContent.innerHTML = html;
            window.scrollTo({ top: 0, behavior: "smooth" });
        }
    });

    form.addEventListener("reset", function () {
        setTimeout(() => {
            clearErrors();
        }, 0);
    });
</script>
</body>
</html>
